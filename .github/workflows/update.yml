name: Update Channels

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install selenium webdriver-manager
      
      - name: Run scraper
        run: python boru_scraper.py
      
      - name: Commit changes
        run: |
          git config user.name "Cuma Kablo Bot"
          git config user.email "bot@cumakablo.tv"
          git add channels.json playlist.m3u
          git diff --quiet && git diff --staged --quiet || \
          git commit -m "Güncelleme: $(date +'%d/%m/%Y %H:%M')"
          git push
