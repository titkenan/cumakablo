name: Update Boru TV

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install deps
      run: pip install selenium webdriver-manager
    
    - name: Run scraper
      run: python boru_scraper.py
    
    - name: Commit & Push
      run: |
        git config user.name "BoruBot"
        git config user.email "boru@tv.com"
        git add channels.json boru_channels.m3u
        git commit -m "Güncellendi: $(date +'%d.%m.%Y %H:%M')" || exit 0
        git push
