# .github/workflows/update.yml
name: Update Live

on:
  schedule:
    - cron: '*/30 * * * *'  # HER 30 DAKİKADA BİR!
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install deps
        run: pip install selenium webdriver-manager requests
      
      - name: Scrape fresh links
        run: python boru_scraper.py
      
      - name: Upload to Cloudflare KV
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          curl -X PUT "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/storage/kv/namespaces/YOUR_KV_ID/values/channels" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data @channels.json
